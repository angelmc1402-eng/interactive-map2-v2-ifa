<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Generador de 480 Mesas</title>
</head>
<body style="font-family: sans-serif; padding: 40px; text-align: center; background: #f0f0f0;">
    <div style="background: white; padding: 30px; border-radius: 12px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); max-width: 600px; margin: 0 auto;">
        <h2>🧩 Generador Automático de Mapas</h2>
        <p style="color: #666; margin-bottom: 20px;">
            Aplica la geometría exacta de DIECAST-A al resto de 14 bloques para generar las 480 mesas sin perder ni un decimal de precisión.
        </p>
        <button onclick="generar()" style="padding: 15px 30px; font-size: 16px; font-weight: bold; background: #2ecc71; color: white; border: none; border-radius: 8px; cursor: pointer; transition: transform 0.2s;">
            📋 Copiar las 480 Mesas
        </button>
        <textarea id="resultado" style="width: 100%; height: 200px; margin-top: 20px; font-family: monospace; border: 2px solid #ddd; padding: 10px; border-radius: 8px;"></textarea>
    </div>

    <script>
    // La geometría exacta extraída de tu bloque DIECAST-A
    const offsets = [
        {t:0.0000, l:0.0000, w:0.34, h:1.38},
        {t:-1.4188, l:0.0000, w:0.34, h:1.38},
        {t:-1.8005, l:0.3185, w:1.17, h:0.41},
        {t:-1.8007, l:1.5085, w:1.17, h:0.41},
        {t:-1.8007, l:3.8884, w:1.17, h:0.41},
        {t:-1.8007, l:5.0884, w:1.17, h:0.41},
        {t:-1.8007, l:6.2784, w:1.17, h:0.41},
        {t:-1.8007, l:7.4684, w:1.17, h:0.41},
        {t:-1.8007, l:8.6584, w:1.17, h:0.41},
        {t:-1.8007, l:9.8484, w:1.17, h:0.41},
        {t:-1.8008, l:11.0197, w:1.17, h:0.41},
        {t:-1.8008, l:12.2197, w:1.17, h:0.41},
        {t:-1.8008, l:13.4197, w:1.17, h:0.41},
        {t:-1.8008, l:14.6097, w:1.17, h:0.41},
        {t:-1.8008, l:15.7997, w:1.17, h:0.41},
        {t:-1.8008, l:16.9897, w:1.17, h:0.41},
        {t:-1.4108, l:18.1397, w:0.34, h:1.38},
        {t:-0.0008, l:18.1396, w:0.34, h:1.38},
        {t:1.3707, l:16.9857, w:1.17, h:0.41},
        {t:1.3707, l:15.7957, w:1.17, h:0.41},
        {t:1.3707, l:13.4157, w:1.17, h:0.41},
        {t:1.3707, l:12.2257, w:1.17, h:0.41},
        {t:1.3707, l:11.0357, w:1.17, h:0.41},
        {t:1.3707, l:9.8357, w:1.17, h:0.41},
        {t:1.3706, l:8.6456, w:1.17, h:0.41},
        {t:1.3706, l:7.4656, w:1.17, h:0.41},
        {t:1.3706, l:6.2656, w:1.17, h:0.41},
        {t:1.3706, l:5.0756, w:1.17, h:0.41},
        {t:1.3706, l:3.8856, w:1.17, h:0.41},
        {t:1.3706, l:2.6956, w:1.17, h:0.41},
        {t:1.3706, l:1.5056, w:1.17, h:0.41},
        {t:1.3706, l:0.3156, w:1.17, h:0.41}
    ];

    // Los puntos base de cada bloque que proporcionaste
    const bases = {
        "DIECAST-A": {t: 30.9764, l: 15.8599},
        "DIECAST-B": {t: 30.9856, l: 38.0995},
        "DIECAST-C": {t: 42.9463, l: 15.8598},
        "DIECAST-D": {t: 42.9656, l: 38.0995},
        "DIECAST-E": {t: 50.3661, l: 15.8597},
        "DIECAST-F": {t: 50.3655, l: 38.0995},
        "DIECAST-G": {t: 62.3285, l: 15.8597},
        "DIECAST-H": {t: 62.3454, l: 38.0995},
        "DIECAST-I": {t: 68.5353, l: 38.0995},
        "FIGURES-A": {t: 42.8238, l: 58.8594},
        "FIGURES-B": {t: 50.4237, l: 58.8593},
        "FIGURES-C": {t: 62.2738, l: 58.8593},
        "FIGURES-D": {t: 68.4537, l: 58.8593},
        "MANGACOM-A": {t: 83.6130, l: 38.8210},
        "MANGACOM-B": {t: 83.6110, l: 58.7009}
    };

    function generar() {
        let html = "";
        for (const [block, base] of Object.entries(bases)) {
            offsets.forEach((off, i) => {
                const top = (base.t + off.t).toFixed(4);
                const left = (base.l + off.l).toFixed(4);
                html += `<div class="mesa" data-info="${block}-${i+1}" style="width: ${off.w}%; height: ${off.h}%; top: ${top}%; left: ${left}%;"></div>\n`;
            });
        }
        
        const txt = document.getElementById('resultado');
        txt.value = html;
        txt.select();
        document.execCommand('copy');
        alert("¡Las 480 mesas se han copiado al portapapeles!\n\nYa puedes pegarlas limpiamente en tu archivo mesas.html.");
    }
    </script>
</body>
</html>
