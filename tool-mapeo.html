
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>HALL 2 - Puzzle Builder Pro</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
    :root {
        --verde-base: #2ecc71;
        --azul-sel: #00d2d3;
        --rojo-del: #ff6b6b;
        --naranja-rot: #ff9f43;
        --dark-bg: #222f3e;
        --panel-bg: #ffffff;
        --fuente: 'Inter', sans-serif;
    }

    body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: var(--dark-bg); font-family: var(--fuente); }
    
    #viewport { width: 100vw; height: 100vh; overflow: auto; display: block; cursor: grab; }
    #viewport:active { cursor: grabbing; }
    
    #container { position: relative; transform-origin: 0 0; transition: transform 0.05s ease-out; display: inline-block; }
    img { display: block; image-rendering: high-quality; max-width: none; pointer-events: none; user-select: none; }

    /* MESAS (Las piezas del puzzle) */
    .mesa { 
        position: absolute; 
        border: 2px solid var(--verde-base); 
        background: rgba(46, 204, 113, 0.4); 
        z-index: 10; cursor: pointer; 
        box-sizing: border-box;
        border-radius: 2px;
    }
    
    .mesa:hover { background: rgba(46, 204, 113, 0.8); z-index: 100; border-color: white; }
    
    .mesa.selected {
        border: 2px solid var(--azul-sel);
        background: rgba(0, 210, 211, 0.6);
        z-index: 200;
        box-shadow: 0 0 20px rgba(0, 210, 211, 0.8);
    }

    /* PALETA IZQUIERDA */
    #palette {
        position: fixed; top: 10px; left: 10px; width: 280px; bottom: 10px;
        background: var(--panel-bg); padding: 15px; border-radius: 8px;
        box-shadow: 5px 0 30px rgba(0,0,0,0.3); z-index: 20000;
        display: flex; flex-direction: column;
    }
    
    #palette h3 { margin: 0 0 15px 0; font-size: 14px; color: #333; text-transform: uppercase; border-bottom: 2px solid #eee; padding-bottom: 10px; }
    
    .scroll-area { flex: 1; overflow-y: auto; padding-right: 5px; }
    
    .section-group { margin-bottom: 15px; }
    .group-title { font-size: 11px; font-weight: 800; color: #888; margin-bottom: 5px; letter-spacing: 1px; }
    
    .piece-btn {
        display: flex; justify-content: space-between; align-items: center;
        width: 100%; padding: 8px 12px; margin-bottom: 6px;
        background: #f7f7f7; border: 1px solid #ddd; border-radius: 6px;
        cursor: pointer; transition: all 0.1s; font-size: 12px; font-weight: 600; color: #444;
    }
    .piece-btn:hover { background: #e0e0e0; transform: translateX(2px); border-color: #bbb; }
    .tag-h { background: #81ecec; color: #00cec9; padding: 2px 5px; border-radius: 3px; font-size: 9px; font-weight: bold;}

    .btn-magic {
        width: 100%; padding: 12px; background: #8e44ad; color: white;
        border: none; border-radius: 6px; font-weight: bold; cursor: pointer;
        margin-bottom: 15px; text-transform: uppercase; font-size: 12px;
        box-shadow: 0 4px 10px rgba(142, 68, 173, 0.3); transition: all 0.2s;
    }
    .btn-magic:hover { background: #9b59b6; transform: translateY(-2px); }

    /* PROPIEDADES (FLOTANTE) */
    #prop-float {
        position: fixed; top: 20px; right: 20px; background: white; padding: 15px;
        border-radius: 8px; box-shadow: 0 10px 30px rgba(0,0,0,0.3); z-index: 20000;
        width: 220px; display: none;
    }
    #prop-float.active { display: block; animation: popIn 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
    @keyframes popIn { from { transform: scale(0.9); opacity:0; } to { transform: scale(1); opacity:1; } }

    .btn-action { width: 100%; padding: 10px; border: none; border-radius: 5px; font-weight: bold; cursor: pointer; margin-top: 8px; font-size: 12px; }
    .btn-dup { background: var(--verde-base); color: white; }
    .btn-rot { background: var(--naranja-rot); color: white; }
    .btn-del { background: var(--rojo-del); color: white; }

    #export-bar {
        position: fixed; bottom: 20px; left: 310px; right: 20px;
        pointer-events: none; display: flex; justify-content: center; z-index: 20000;
    }
    .btn-exp { pointer-events: auto; background: #2d3436; color: #00d2d3; border: 2px solid #00d2d3; padding: 12px 30px; border-radius: 50px; font-weight: 800; cursor: pointer; box-shadow: 0 10px 20px rgba(0,0,0,0.4); transition: transform 0.2s; }
    .btn-exp:hover { transform: translateY(-3px) scale(1.05); background: #00d2d3; color: white; }

    #clipboard-area { position: absolute; left: -9999px; }
</style>
</head>
<body>

    <div id="palette">
        <h3>🧩 Puzzle Builder</h3>
        
        <button class="btn-magic" onclick="generarPuzzleMasivo()">✨ Generar Puzzle (480)</button>

        <div class="scroll-area">
            <div class="section-group">
                <div class="group-title">DIECAST (A - I)</div>
                <div id="btn-container-die"></div>
            </div>

            <div class="section-group">
                <div class="group-title">FIGURES (A - D)</div>
                <div id="btn-container-fig"></div>
            </div>

            <div class="section-group">
                <div class="group-title">MANGA & COMIC (A - B)</div>
                <div id="btn-container-man"></div>
            </div>
        </div>
        <div style="font-size:11px; color:#999; margin-top:10px; text-align:center; border-top:1px solid #eee; padding-top:10px; line-height: 1.5;">
            'R' -> <b>GIRAR MESA</b><br>
            'D' -> <b>DUPLICAR (+1)</b><br>
            'Supr' -> <b>BORRAR</b><br>
            Flechas -> <b>MOVER PÍXEL</b>
        </div>
    </div>

    <div id="prop-float">
        <label style="font-size:10px; font-weight:bold; color:#999;">ID MESA</label>
        <input type="text" id="inp-id" style="width:100%; padding:8px; border:2px solid #ddd; border-radius:4px; font-weight:bold; font-family:monospace; margin-bottom:10px; box-sizing: border-box;">
        
        <button class="btn-action btn-rot" onclick="rotateSelected()">🔄 GIRAR (R)</button>
        <button class="btn-action btn-dup" onclick="duplicateSelected()">✨ DUPLICAR (D)</button>
        <button class="btn-action btn-del" onclick="deleteSelected()">🗑️ ELIMINAR</button>
    </div>

    <div id="export-bar">
        <button class="btn-exp" onclick="exportHTML()">💾 EXPORTAR HTML FINAL</button>
    </div>

    <div id="viewport">
        <div id="container">
            <img id="map-img" src="Hall 2.png" alt="Map Hall 2">
            <div id="capa-mesas"></div> 
        </div>
    </div>

    <textarea id="clipboard-area"></textarea>

<script>
    // --- TAMAÑOS EXACTOS ---
    const SIZE_H = { w: 1.17, h: 0.41 }; // Horizontal
    const SIZE_V = { w: 0.34, h: 1.38 }; // Vertical

    // --- NUEVA ESTRUCTURA DE LETRAS ---
    const GROUPS = {
        'DIECAST': ['A','B','C','D','E','F','G','H','I'],
        'FIGURES': ['A','B','C','D'],
        'MANGACOM': ['A','B']
    };

    let scale = 0.2;
    const container = document.getElementById('container');
    const viewport = document.getElementById('viewport');
    const mapImg = document.getElementById('map-img');
    const capaMesas = document.getElementById('capa-mesas');
    const propPanel = document.getElementById('prop-float');
    const inputId = document.getElementById('inp-id');

    let selectedElement = null;
    let isDragging = false;
    let dragOffset = { x: 0, y: 0 };

    window.onload = () => {
        generateButtons();
        if(mapImg.complete) init();
        else mapImg.onload = init;
    };

    async function init() {
        fit();
        try {
            const resp = await fetch('mesas.html?v=' + Date.now());
            if(resp.ok) {
                capaMesas.innerHTML = await resp.text();
                document.querySelectorAll('.mesa').forEach(addInteractions);
            }
        } catch(e) {}
        viewport.addEventListener('wheel', handleWheel, { passive: false });
    }

    // --- BOTÓN MÁGICO: GENERAR LAS 480 MESAS ---
    window.generarPuzzleMasivo = function() {
        if(!confirm("Esto creará las 480 mesas ordenadas en filas arriba a la izquierda. ¿Empezamos?")) return;
        
        let startTop = 2; // Empezamos en el 2% de altura
        
        Object.keys(GROUPS).forEach(cat => {
            GROUPS[cat].forEach(letra => {
                let startLeft = 2; // Empezamos en el 2% de ancho para cada letra
                
                for(let i=1; i<=32; i++) {
                    const idName = `${cat}-${letra}-${i}`;
                    
                    // Comprobar si ya existe para no duplicar
                    if(document.querySelector(`[data-info="${idName}"]`)) continue;

                    const div = document.createElement('div');
                    div.className = 'mesa';
                    div.setAttribute('data-info', idName);
                    
                    div.style.width = SIZE_H.w + '%';
                    div.style.height = SIZE_H.h + '%';
                    div.style.top = startTop.toFixed(2) + '%';
                    div.style.left = startLeft.toFixed(2) + '%';

                    capaMesas.appendChild(div);
                    addInteractions(div);
                    
                    startLeft += (SIZE_H.w + 0.1); // Separación horizontal
                }
                startTop += (SIZE_H.h + 0.3); // Separación vertical para la siguiente letra
            });
        });

        alert("¡Puzzle generado! Tienes las piezas arriba a la izquierda listas para colocar.");
    }

    function generateButtons() {
        const cDie = document.getElementById('btn-container-die');
        GROUPS['DIECAST'].forEach(L => createBtn(cDie, `DIECAST-${L}`));

        const cFig = document.getElementById('btn-container-fig');
        GROUPS['FIGURES'].forEach(L => createBtn(cFig, `FIGURES-${L}`));

        const cMan = document.getElementById('btn-container-man');
        GROUPS['MANGACOM'].forEach(L => createBtn(cMan, `MANGACOM-${L}`));
    }

    function createBtn(container, label) {
        const btn = document.createElement('div');
        btn.className = 'piece-btn';
        btn.innerHTML = `<span>${label}</span> <span class="tag-h">+1 MESA</span>`;
        btn.onclick = () => spawnTable(label + '-1');
        container.appendChild(btn);
    }

    window.spawnTable = function(idName) {
        const div = document.createElement('div');
        div.className = 'mesa';
        div.setAttribute('data-info', idName);
        
        const rect = viewport.getBoundingClientRect();
        const centerX = (rect.width / 2 - container.getBoundingClientRect().left) / scale;
        const centerY = (rect.height / 2 - container.getBoundingClientRect().top) / scale;

        const leftP = (centerX / mapImg.naturalWidth) * 100;
        const topP = (centerY / mapImg.naturalHeight) * 100;

        div.style.width = SIZE_H.w + '%';
        div.style.height = SIZE_H.h + '%';
        div.style.top = topP.toFixed(2) + '%';
        div.style.left = leftP.toFixed(2) + '%';

        capaMesas.appendChild(div);
        addInteractions(div);
        selectMesa(div);
    }

    // --- INTERACCIONES ---
    function addInteractions(el) {
        el.addEventListener('mousedown', (e) => {
            e.stopPropagation();
            selectMesa(el);
            isDragging = true;
            const rect = el.getBoundingClientRect();
            dragOffset.x = e.clientX - rect.left;
            dragOffset.y = e.clientY - rect.top;
        });
    }

    document.addEventListener('mousemove', (e) => {
        if (!isDragging || !selectedElement) return;
        e.preventDefault();
        const containerRect = container.getBoundingClientRect();
        let x = (e.clientX - containerRect.left - dragOffset.x) / scale;
        let y = (e.clientY - containerRect.top - dragOffset.y) / scale;
        
        const leftP = (x / mapImg.naturalWidth) * 100;
        const topP = (y / mapImg.naturalHeight) * 100;
        
        selectedElement.style.left = leftP.toFixed(4) + '%';
        selectedElement.style.top = topP.toFixed(4) + '%';
    });

    document.addEventListener('mouseup', () => isDragging = false);

    function selectMesa(el) {
        if(selectedElement) selectedElement.classList.remove('selected');
        selectedElement = el;
        selectedElement.classList.add('selected');
        propPanel.classList.add('active');
        inputId.value = selectedElement.getAttribute('data-info');
    }

    viewport.addEventListener('mousedown', (e) => {
        if(e.target === viewport || e.target === container || e.target === mapImg) {
            if(selectedElement) selectedElement.classList.remove('selected');
            selectedElement = null;
            propPanel.classList.remove('active');
        }
    });

    inputId.addEventListener('input', (e) => {
        if(selectedElement) selectedElement.setAttribute('data-info', e.target.value.toUpperCase());
    });

    // --- GIRO ---
    window.rotateSelected = function() {
        if(!selectedElement) return;
        const currentW = parseFloat(selectedElement.style.width);
        const isHorizontal = currentW > 1.0; 
        
        if (isHorizontal) {
            selectedElement.style.width = SIZE_V.w + '%';
            selectedElement.style.height = SIZE_V.h + '%';
        } else {
            selectedElement.style.width = SIZE_H.w + '%';
            selectedElement.style.height = SIZE_H.h + '%';
        }
    }

    // --- DUPLICAR ---
    window.duplicateSelected = function() {
        if(!selectedElement) return;
        const clone = selectedElement.cloneNode(true);
        const oldId = selectedElement.getAttribute('data-info');
        
        const parts = oldId.split('-');
        if(!isNaN(parts[parts.length-1])) {
            parts[parts.length-1] = parseInt(parts[parts.length-1]) + 1;
            clone.setAttribute('data-info', parts.join('-'));
        }

        const currentW = parseFloat(selectedElement.style.width);
        const currentH = parseFloat(selectedElement.style.height);
        const isHorizontal = currentW > 1.0;

        let top = parseFloat(selectedElement.style.top);
        let left = parseFloat(selectedElement.style.left);

        if (isHorizontal) left += (currentW - 0.05); 
        else top += (currentH - 0.05);

        clone.style.top = top.toFixed(4) + '%';
        clone.style.left = left.toFixed(4) + '%';

        capaMesas.appendChild(clone);
        addInteractions(clone);
        selectMesa(clone);
    }

    window.deleteSelected = function() {
        if(selectedElement) {
            selectedElement.remove();
            selectedElement = null;
            propPanel.classList.remove('active');
        }
    }

    // --- TECLADO ---
    document.addEventListener('keydown', (e) => {
        if(!selectedElement) return;
        if (document.activeElement === inputId) return;

        if(e.key.startsWith('Arrow')) {
            e.preventDefault();
            const step = e.shiftKey ? 0.1 : 0.01; 
            let t = parseFloat(selectedElement.style.top);
            let l = parseFloat(selectedElement.style.left);
            if(e.key === 'ArrowUp') t -= step;
            if(e.key === 'ArrowDown') t += step;
            if(e.key === 'ArrowLeft') l -= step;
            if(e.key === 'ArrowRight') l += step;
            selectedElement.style.top = t.toFixed(4) + '%';
            selectedElement.style.left = l.toFixed(4) + '%';
        }

        if(e.key === 'Delete' || e.key === 'Backspace') deleteSelected();
        if(e.key.toLowerCase() === 'd') duplicateSelected();
        if(e.key.toLowerCase() === 'r') rotateSelected();
    });

    // --- ZOOM ---
    function handleWheel(e) {
        if(true) {
            e.preventDefault();
            const delta = e.deltaY > 0 ? 0.9 : 1.1;
            let newScale = scale * delta;
            if(newScale > 0.05 && newScale < 15) {
                scale = newScale;
                container.style.transform = `scale(${scale})`;
            }
        }
    }

    // --- EXPORTAR ---
    window.exportHTML = function() {
        let html = "";
        const mesas = document.querySelectorAll('.mesa');
        
        const arrayMesas = Array.from(mesas).sort((a, b) => {
            return a.getAttribute('data-info').localeCompare(b.getAttribute('data-info'), undefined, {numeric: true});
        });

        arrayMesas.forEach(m => {
            html += `<div class="mesa" data-info="${m.getAttribute('data-info')}" style="${m.getAttribute('style')}"></div>\n`;
        });

        const area = document.getElementById('clipboard-area');
        area.value = html;
        area.select();
        document.execCommand('copy');
        alert("¡Puzzle Copiado! 🧩 (" + mesas.length + " mesas).\n\nPégalo en tu archivo mesas.html");
    }

    function fit() {
        const imgWidth = mapImg.naturalWidth || 5000;
        scale = (window.innerWidth / imgWidth) * 0.9;
        container.style.transform = `scale(${scale})`;
    }
</script>
</body>
</html>
